      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #1b1b1f;
      border-radius: 12px;
      padding: 18px;
      border: 1px solid #333;
    }

    .back {
      margin-bottom: 14px;

    }

    .title {
      font-size: 2rem;
      margin: 6px 0;
    }

    .price {
      color: #fff;

      margin: 6px 0;
    }

    .desc {
      margin: 14px 0;

      color: #ddd;
    }

    .meta {
      margin: 8px 0;
    }

    .image {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #444;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 14px;
      align-items: start;
    }

    .left-panel {
      background: #121216;
      border-radius: 12px;
      border: 1px solid #333;
      padding: 12px;
    }

    .right-panel {
      background: #121216;
      border-radius: 12px;
      border: 1px solid #333;
      padding: 14px;
    }

    .image {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #444;
    }

    .rating {
      margin-top: 10px;
      color: #ffd54f;
      font-size: 1.15rem;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .detail-card {
      background: #23232a;
      border-radius: 8px;
      border: 1px solid #2d2d3a;
      padding: 10px;
    }

    .detail-card strong {
      color: #fff;
    }

    .payment-row {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .payment-row select,
    .payment-row input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #444;
      padding: 9px;
      background: #0d0d12;
      color: #fff;
    }

    .payment-row label {
      color: #ccc;
      font-weight: 600;
    }

    .product-actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
      color: #111;
      background: #ffd54f;
    }

    .btn:hover {
      filter: brightness(0.95);
    }

    .pay {
      background: #28a745;
      color: #fff;
    }

    .related-section {
      margin-top: 20px;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .related-card {
      background: #1e1f26;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .related-card img {
      width: 100%;
      height: 120px;
      border-radius: 8px;
      object-fit: cover;
    }

    .related-card button {
      border: none;
      border-radius: 6px;
      padding: 6px;
      background: #ffd54f;
      color: #111;
      font-weight: 700;
      cursor: pointer;
    }

    .default {
      text-align: center;
      margin-top: 30px;
    }

    /* Forced theme: white background + blue buttons */
    html,
    body {
      background: #ffffff !important;
      /* color: #0d133d !important; */
    }

      background-image: none !important;
    }

    .back-btn,

    Object.keys(products).forEach((key) => {
      const p = products[key];
      if (!p.offer) p.offer = "Flat 10% off on prepaid orders";
      if (!p.location) p.location = "Noida distribution center";
    });

    function getProductKey() {
      const params = new URLSearchParams(window.location.search);
      return params.get("product") || "";
    }

    function renderDetails() {
      // console.log("Selected product:", key);
      const key = getProductKey();
      const section = document.getElementById("detailsSection");
      if (!section) return;

      if (!key || !products[key]) {
        section.innerHTML = `<p class="default">Product not found. Go back to <a href=\"ecom.html\">Shop</a> and choose another item.</p>`;
        return;
      }

      const p = products[key];
      const stars = "★".repeat(Math.floor(p.rating || 4.5)) + "☆".repeat(5 - Math.floor(p.rating || 4.5));
      section.innerHTML = `
        <div class="detail-layout">
          <div class="left-panel">
            <img src="${p.image}" alt="${key}" class="image" />
          </div>
          <div class="right-panel">
            <div class="title">${key}</div>
            <div class="price">${p.price}</div>
            <div class="rating">${stars} (${(p.rating || 4.5).toFixed(1)} / 5)</div>
            <p class="desc">${p.description}</p>
            <div class="detail-grid">
              <div class="detail-card"><strong>SKU:</strong> ${p.sku}</div>
              <div class="detail-card"><strong>Sizes:</strong> ${p.sizes}</div>
              <div class="detail-card"><strong>Material:</strong> ${p.material}</div>
              <div class="detail-card"><strong>Category:</strong> Fashion Apparel</div>
              <div class="detail-card"><strong>Offer:</strong> ${p.offer || 'No current offer'}</div>
              <div class="detail-card"><strong>Location:</strong> ${p.location || 'Unknown warehouse'}</div>
            </div>
            <div class="payment-row">
              <label for="addressInput">Delivery Address</label>
              <input id="addressInput" type="text" placeholder="Enter full shipping address" value="${p.location || 'Your local address'}" />
              <label for="paymentMethod">Payment Method</label>
              <select id="paymentMethod">
                <option value="UPI">UPI</option>
                <option value="Card">Credit/Debit Card</option>
                <option value="NetBanking">Net Banking</option>
                <option value="COD">Cash on Delivery</option>
              </select>
            </div>
            <div class="product-actions">
              <button class="btn" id="addCartBtn">Add to Cart</button>
              <button class="btn pay" id="payBtn">Pay Now</button>
            </div>
          </div>
        </div>
        <div id="relatedSection" class="related-section"></div>`;

      document.getElementById('addCartBtn')?.addEventListener('click', () => {
        addToCart(p, key);
      });
      document.getElementById('payBtn')?.addEventListener('click', () => {
        const method = document.getElementById('paymentMethod')?.value || 'UPI';
        const address = document.getElementById('addressInput')?.value || 'No address provided';
        payNow(key, p.price, method, address);
      });
      renderRelatedProducts(key);
    }

    function renderRelatedProducts(currentKey) {
      const related = document.getElementById('relatedSection');
      if (!related) return;
      const keys = Object.keys(products).filter((k) => k !== currentKey);
      const sample = keys.sort(() => Math.random() - 0.5).slice(0, 3);
      related.innerHTML = `
        <h3 style="margin-top:20px;color:#fff;font-size:1.2rem;">Related Products</h3>
        <div class="related-grid">
          ${sample
          .map((key) => {
            const product = products[key];
            return `<div class="related-card"><img src="${product.image}" alt="${key}" /><div><strong>${key}</strong><div style='color:#ddf; margin-top:4px;'>${product.price}</div></div><button class='details-btn' data-key='${encodeURIComponent(key)}'>View</button></div>`;
          })
          .join('')}
        </div>`;
      related.querySelectorAll('.details-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          const key = decodeURIComponent(e.target.dataset.key || '');
          if (key) window.location.href = `files.html?product=${encodeURIComponent(key)}`;
        });
      });
    }

    function addToCart(product, name) {
      try {
        const cartKey = 'shopx_cart_v1';
        const cartRaw = localStorage.getItem(cartKey);
        const current = Array.isArray(cartRaw ? JSON.parse(cartRaw) : []) ? JSON.parse(cartRaw || '[]') : [];
        const priceNumber = Number(String(product.price || "0").replace(/[^\d]/g, "")) || 0;
        // Keep cart data consistent with other pages (cart expects `item` + numeric `price`)
        const item = { item: name, price: priceNumber, image: product.image || "" };
        current.push(item);
        localStorage.setItem(cartKey, JSON.stringify(current));
        alert(`${name} added to cart.`);
      } catch (err) {
        console.error('Add to cart failed', err);
        alert('Could not add to cart. Please enable localStorage or try again.');
      }
    }

    function payNow(name, price, method, address) {
      alert(`Proceeding to payment for ${name} (${price}) via ${method}.\nDeliver to: ${address}`);
    }

    const BG_KEY = 'shopx_bg_v1';
    function setBg(theme) {
      let bodyBg = 'radial-gradient(circle at 20% 10%, #ff3f3f, #0d133d 45%, #050916 100%)';
      let containerBg = '#1b1b1f';
      let cardBg = '#121216';
      let titleColor = '#fff';
      let buttonBg = '#ffd54f';
      if (theme === 'blue') {
        bodyBg = 'radial-gradient(circle at 20% 10%, #4087ff, #10214c 45%, #05102d 100%)';
        containerBg = '#0d1736';
        cardBg = '#121d3a';
        titleColor = '#e9f2ff';
        buttonBg = '#1e90ff';
      }
      if (theme === 'white') {
        bodyBg = 'radial-gradient(circle at 20% 10%, #ffffff, #e8e8ff 45%, #d9dcf5 100%)';
        containerBg = '#f5f7ff';
        cardBg = '#e9ebff';
        titleColor = '#111';
        buttonBg = '#0d47a1';
      }
      if (theme === 'gold-black') {
        bodyBg = 'radial-gradient(circle at 20% 10%, #f8d147, #3f2d01 45%, #09090a 100%)';
        containerBg = '#2b230d';
        cardBg = '#1f1a0f';
        titleColor = '#fff';
        buttonBg = '#cc8400';
      }
      document.body.style.background = bodyBg;
      document.querySelectorAll('.container').forEach((el) => { el.style.background = containerBg; });
      document.querySelectorAll('.left-panel, .right-panel, .detail-card, .related-card').forEach((el) => { el.style.background = cardBg; });
      document.querySelectorAll('.title, .price, .desc, .detail-row label').forEach((el) => { if (el) el.style.color = titleColor; });
      document.querySelectorAll('.btn').forEach((el) => { el.style.background = buttonBg; if (theme === 'white') { el.style.color = '#fff'; } else { el.style.color = '#111'; } });
    }
    function loadBg() {
      const saved = localStorage.getItem(BG_KEY) || 'original';
      setBg(saved);
    }
    loadBg();
    renderDetails();
  </script>
