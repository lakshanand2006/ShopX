<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopX - Categories</title>
  <style>
    :root {
      /* --bg: radial-gradient(circle at 20% 10%, #ff3f3f, #0d133d 45%, #050916 100%); */
      --text: #f2f2ff;
      --muted: rgba(242, 242, 255, .78);
      --card: rgba(255, 255, 255, 0.95);
      --accent: #ff2a2a;
      --shadow: 0 14px 40px rgba(0, 0, 0, .35);
      --shadow-soft: 0 10px 26px rgba(0, 0, 0, .22);
      --accent-2: #ffd27f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(140deg, rgba(255, 255, 255, 0.07) 0 1px, transparent 1px 24px), linear-gradient(40deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 24px);
      pointer-events: none;
      z-index: -1;
    }

    .navbar {
      background: #111;
      color: #fff;
      padding: 12px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      /* border-bottom: 1px solid rgba(255, 63, 63, .55); */
      /* backdrop-filter: blur(10px); */
    }

    .logo {
      color: #fff;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
      /* text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); */
    }

    .search input {
      width: 280px;
      border: 1px solid rgba(0, 0, 0, .08);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.96);
      color: #111;
      outline: none;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .18);
      transition: box-shadow .2s ease, transform .2s ease;
    }

    .search input:focus {
      box-shadow: 0 12px 26px rgba(0, 0, 0, .26);
      transform: translateY(-1px);
    }

    .bg-buttons {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      color: #fff;
      margin-right: 12px;
    }

    .bg-buttons button {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      padding: 6px 9px;
      font-size: .75rem;
      cursor: pointer;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      transition: transform .15s ease, background .15s ease;
    }

    .bg-buttons button:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: translateY(-1px);
    }

    .cart-icon {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
      /* box-shadow: 0 10px 22px rgba(255, 0, 0, 0.22); */
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .cart-icon:hover {
      background: #d50707;
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(255, 0, 0, 0.28);
    }

    .banner {
      margin: 18px auto 0;
      max-width: 1100px;
      background: rgba(212, 211, 211);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      padding: 22px;
      text-align: center;
      /* box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px); */
    }

    .banner h1 {
      margin-bottom: 6px;
      font-size: 2rem;
      color: #111;
      /* text-shadow: 0 0 18px rgba(255, 255, 255, 0.35); */
    }

    .banner p {
      color: #111;
      font-weight: 700;
    }

    .products {
      padding: 14px;
      max-width: 1160px;
      margin: 0 auto;
    }

    .products h2 {
      margin: 10px 0 12px;
      color: #111;
      font-size: 1.8rem;
      /* text-shadow: 0 0 10px rgba(0, 0, 0, 0.4); */
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .product {
      background: rgba(212, 211, 211);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      transition: transform .2s ease, box-shadow .2s ease;
      border: 1px solid rgba(0, 0, 0, .06);
    }

    .product:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow);
    }

    .product img {
      height: 180px;
      width: 100%;
      object-fit: cover;
    }

    .product h3 {
      margin: 10px 12px 4px;
      font-size: 1.05rem;
      color: #111;
    }

    .price {
      margin: 8px 12px;
      color: #111;
      font-weight: 800;
    }

    .product-buttons {
      display: flex;
      gap: 8px;
      margin: 10px 12px 12px;
    }

    .details-btn,
    .cart-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 10px;
      font-weight: 850;
      cursor: pointer;
      flex: 1;
      transition: transform .16s ease, filter .16s ease, box-shadow .16s ease;
    }

    .details-btn {
      background: #111;
      color: #fff;
      box-shadow: 0 10px 18px rgba(0, 0, 0, .18);
    }

    .details-btn:hover {
      background: #383838;
    }

    .cart-btn {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 10px 18px rgba(255, 0, 0, .16);
    }

    .cart-btn:hover {
      background: #d10f10;
    }

    footer {
      background: #111;
      text-align: center;
      padding: 50px;
      border-top: 1px solid #eee;
      margin-top: 20px;
      color: white;
    }

    body {
      cursor: url('https://img.icons8.com/color/48/000000/white-dot-cursor.png'), auto;
    }

    .details-btn,
    .cart-btn,
    .back-btn,
    .login-btn,
    .checkout-btn,
    .pay-btn {
      cursor: url('https://img.icons8.com/fluency-systems-filled/24/ffffff/hand-cursor.png'), pointer;
    }

    @media (max-width: 720px) {
      .navbar {
        gap: 10px;
        padding: 10px 12px;
        flex-wrap: wrap;
      }

      .search {
        width: 100%;
      }

      .search input {
        width: 100%;
      }

      .banner {
        margin-left: 10px;
        margin-right: 10px;
      }
    }

    /* Forced theme: white background + blue buttons */
    html,
    body {
      background: #ffffff !important;
      color: #0d133d !important;
    }

    body::before {
      background-image: none !important;
    }

    /* a,
    a:visited {
      color: #0b79d0 !important;
    } */

    /* .navbar,
    .banner,

    .right-panel,

      color: #0d133d !important;
    } */

    .navbar {
      border-bottom: 2px solid rgba(30, 144, 255, 0.35) !important;
    }

    .navbar a {
      color: #fff !important;
    }

    input,
    textarea,
    select {
      background: #ffffff !important;
      color: #0d133d !important;
      border: 1px solid rgba(13, 19, 61, 0.18) !important;
    }

    .sling-back-btn {
      text-decoration: none;
      background: #111 !important;
      color: #ffffff !important;
      border: none !important;
      display: inline-block;
      /* background: linear-gradient(135deg, #ff2a2a 0%, #c10000 65%, #570000 100%); */
      color: #fff;
      border: 1px solid #ff6e6e;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 800;
      letter-spacing: 0.4px;
      /* box-shadow: 0 8px 18px rgba(255, 0, 0, 0.35), 0 0 8px rgba(255, 255, 255, 0.15); */
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s ease, box-shadow .15s ease, background .2s ease;
    }

    button,
    .cart-icon,
    .cart-btn,
    .details-btn,
    .back-btn,
    .checkout-btn,
    .pay-btn,
    .sling-back-btn,
    .remove-btn,
    .login-btn,
    .logout,
    .order-action {
      background: #111 !important;
      color: #ffffff !important;
      border: none !important;
    }

    button:hover,
    .cart-icon:hover,
    .cart-btn:hover,
    .details-btn:hover,
    .back-btn:hover,
    .checkout-btn:hover,
    .pay-btn:hover,
    .sling-back-btn:hover,
    .remove-btn:hover,
    .logout:hover,
    .order-action:hover {
      background: #0b79d0 !important;
    }
  </style>
</head>

    function getCategoryFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const cat = (params.get("cat") || "").toLowerCase().trim();
      return CATEGORY_PRODUCTS[cat] ? cat : "mens";
    }

    function renderCategory(cat) {
      const title = document.getElementById("categoryTitle");
      const heading = document.getElementById("categoryHeading");
      const subtitle = document.getElementById("categorySubtitle");
      const grid = document.getElementById("categoryGrid");

      const pretty = cat.charAt(0).toUpperCase() + cat.slice(1);
      if (title) title.textContent = pretty;
      if (heading) heading.textContent = pretty + " Picks";
      if (subtitle) subtitle.textContent = "Premium style, same easy shopping";

      if (!grid) return;
      grid.innerHTML = "";

      const list = CATEGORY_PRODUCTS[cat] || [];
      list.forEach((p) => {
        const card = document.createElement("div");
        card.className = "product";
        card.innerHTML = `
          <img src="${p.image}" alt="${p.name}" />
          <h3></h3>
          <p class="price"></p>
          <div class="product-buttons">
            <button class="details-btn" type="button">View details</button>
            <button class="cart-btn" type="button" onclick="addToCart(this)">Add to Cart</button>
          </div>
        `;

        card.querySelector("h3").textContent = p.name;
        card.querySelector(".price").textContent = p.price;
        grid.appendChild(card);
      });
    }

    // --- Cart (persisted) ---
    const CART_KEY = "shopx_cart_v1";
    const cart = loadCart();
    updateCartCount();

    function addToCart(button) {
      const card = button.closest(".product");
      if (!card) return;
      const item = card.querySelector("h3")?.textContent?.trim() || "Item";
      const priceText = card.querySelector(".price")?.textContent?.replace(/[^\d]/g, "") || "0";
      const price = Number(priceText) || 0;
      const image = card.querySelector("img")?.src || "";
      cart.push({ item, price, image });
      saveCart(cart);
      updateCartCount();
    }

    function updateCartCount() {
      const el = document.getElementById("cartCount");
      if (el) el.textContent = String(cart.length);
    }

    function goToCartPage() {
      window.location.href = "cart.html";
    }

    function loadCart() {
      try {
        const raw = localStorage.getItem(CART_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveCart(items) {
      try {
        localStorage.setItem(CART_KEY, JSON.stringify(items));
      } catch {
        // ignore storage failures (private mode / quota)
      }
    }

    // --- View details navigation ---
    function wireDetailsButtons() {
      document.querySelectorAll(".details-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const card = btn.closest(".product");
          const name = card?.querySelector("h3")?.textContent?.trim();
          if (name) window.location.href = `files.html?product=${encodeURIComponent(name)}`;
        });
      });
    }

    // --- Search within category ---
    function wireSearch() {
      const searchInput = document.getElementById("searchInput");
      if (!searchInput) return;
      searchInput.addEventListener("input", () => {
        const filter = searchInput.value.toLowerCase().trim();
        document.querySelectorAll(".product").forEach((product) => {
          const title = product.querySelector("h3")?.textContent?.toLowerCase() || "";
          const priceText = product.querySelector(".price")?.textContent?.toLowerCase() || "";
          const visible = !filter || title.includes(filter) || priceText.includes(filter);
          product.style.display = visible ? "block" : "none";
        });
      });
    }

      //     navbarStyle = "linear-gradient(90deg, #3f4a67, #6f7aa0 70%, #3f4a67)";
      //     accent = "#0d47a1";
      //     cardBg = "#ffffff";
      //   }
      //   if (theme === "gold-black") {
      //     style = "radial-gradient(circle at 20% 10%, #f8d147, #3f2d01 45%, #09090a 100%)";
      //     navbarStyle = "linear-gradient(90deg, #2f2100, #9f7e00 70%, #2f2100)";
      //     accent = "#cc8400";
      //     cardBg = "#fef6dc";
      //   }

      document.body.style.background = style;
      document.querySelectorAll(".navbar").forEach((el) => { el.style.background = navbarStyle; });
      document.querySelectorAll(".cart-icon").forEach((el) => { el.style.background = accent; });
      document.querySelectorAll(".details-btn").forEach((el) => { el.style.background = "#111"; el.style.color = "#fff"; });
      document.querySelectorAll(".cart-btn").forEach((el) => { el.style.background = accent; el.style.color = "#fff"; });
      document.querySelectorAll(".product").forEach((el) => { el.style.background = cardBg; });
      localStorage.setItem(BG_KEY, theme);
    }

    function loadBg() {
      const saved = localStorage.getItem(BG_KEY) || "original";
      setBg(saved);
    }

    // --- Boot ---
    (function init() {
      const cat = getCategoryFromUrl();
      renderCategory(cat);
      wireDetailsButtons();
      wireSearch();
      loadBg();
    })();
