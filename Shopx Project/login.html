<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopX Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* Background */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(212, 211, 211);
      color: #000;
    }

    .logo {
      font-size: 40px;
      font-weight: 700;
      color: black;
      letter-spacing: 2px;
    }

    /* Login Box */
    .login-container {
      width: 350px;
      padding: 30px;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      background: white;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 1.35);
    }

    /* Heading */
    h2 {
      margin: 20px 0;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Input */
    .input-box {
      margin-bottom: 18px;
      text-align: left;
    }

    .input-box label {
      font-size: 13px;
    }

    .input-box input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      outline: none;
    }

    .input-box input:focus {
      border-color: #000;
    }

    /* Button */
    .login-btn {
      width: 100%;
      padding: 12px;
      border: none;
      background: #000;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-btn:hover {
      background: #333;
    }

    /* Links */
    .extra {
      margin-top: 15px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
    }

    .extra a {
      color: #000;
      text-decoration: none;
    }

    .extra a:hover {
      text-decoration: underline;
    }

    /* Message */
    #loginMessage {
      margin-top: 10px;
      font-size: 13px;
      color: red;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h1 class="logo">ShopX</h1>
    <h2>Login</h2>

    <form id="loginForm">

      <div class="input-box">
        <label>Email</label>
        <input id="loginEmail" type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-box">
        <label>Password</label>
        <input id="loginPassword" type="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn">Login</button>

    </form>

    <div id="loginMessage"></div>

    <div class="extra">
      <a href="signup.html">Create Account</a>
      <a href="forget.html">Forgot Password?</a>
    </div>

  </div>

  <script>

    const ACCOUNT_KEY = 'shopx_account_v1';
    const CURRENT_USER_KEY = 'shopx_current_user_v1';

    const messageEl = document.getElementById('loginMessage');

    document.getElementById('loginForm').addEventListener('submit', (event) => {

      event.preventDefault();

      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value.trim();

      if (!email || !password) {
        messageEl.textContent = 'Please enter both email and password.';
        return;
      }

      const raw = localStorage.getItem(ACCOUNT_KEY);

      if (!raw) {
        messageEl.textContent = 'No account found. Create one first.';
        return;
      }

      let account;

      try {
        account = JSON.parse(raw);
      } catch {
        account = null;
      }

      if (!account || account.email !== email || account.password !== password) {
        messageEl.textContent = 'Invalid email or password.';
        return;
      }

      localStorage.setItem(CURRENT_USER_KEY, email);
      messageEl.style.color = "green";
      messageEl.textContent = 'Login successful! Redirecting...';

      setTimeout(() => {
        window.location.href = 'ecom.html';
      }, 500);

    });

  </script>

</body>

</html>
